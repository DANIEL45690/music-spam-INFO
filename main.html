<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VOID SPEECH · 3D визуализация голоса</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #0b0b0f;
            font-family: 'Inter', system-ui, -apple-system, sans-serif;
            overflow: hidden;
            color: #fff;
        }

        /* интерфейс — чистый минимализм с неоном */
        .ui-panel {
            position: absolute;
            z-index: 100;
            backdrop-filter: blur(20px);
            background: rgba(10, 10, 15, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 2rem;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.8), 0 0 0 1px rgba(0, 255, 255, 0.1) inset;
        }

        #status-bar {
            top: 24px;
            left: 24px;
            padding: 12px 24px;
            font-size: 0.9rem;
            font-weight: 400;
            letter-spacing: 0.5px;
            color: #a0aabf;
            display: flex;
            align-items: center;
            gap: 12px;
            border-radius: 40px;
        }

        #status-dot {
            width: 10px;
            height: 10px;
            border-radius: 10px;
            background: #2ecc71;
            box-shadow: 0 0 15px #2ecc71;
            transition: 0.3s;
        }

        #status-dot.idle {
            background: #95a5a6;
            box-shadow: none;
        }

        #transcript-card {
            bottom: 100px;
            left: 50%;
            transform: translateX(-50%);
            width: min(600px, 90vw);
            padding: 28px 36px;
            border-radius: 80px;
            background: rgba(5, 5, 10, 0.75);
            border: 1px solid rgba(0, 255, 255, 0.25);
            box-shadow: 0 30px 60px -20px #000, 0 0 0 1px rgba(0, 255, 255, 0.2) inset;
            text-align: center;
            transition: 0.2s;
        }

        #transcript-text {
            font-size: 1.7rem;
            font-weight: 400;
            line-height: 1.4;
            color: #f0f4ff;
            text-shadow: 0 0 20px rgba(0, 255, 255, 0.5);
            word-break: break-word;
        }

        #transcript-placeholder {
            font-size: 1.2rem;
            opacity: 0.4;
            letter-spacing: 2px;
        }

        #mic-container {
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 24px;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            padding: 8px 16px;
            border-radius: 100px;
            backdrop-filter: blur(10px);
        }

        .mic-btn {
            background: #1f1f2e;
            border: none;
            color: white;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            font-size: 2.2rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.2s;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.6);
        }

        .mic-btn:hover {
            background: #2c2c42;
            border-color: cyan;
            transform: scale(1.03);
            box-shadow: 0 0 30px cyan;
        }

        .mic-btn.listening {
            background: #00c3ff;
            color: #000;
            border-color: white;
            box-shadow: 0 0 50px #00c3ff;
        }

        .emotion-badge {
            background: rgba(255, 255, 255, 0.03);
            padding: 12px 30px;
            border-radius: 40px;
            font-size: 1.3rem;
            font-weight: 500;
            letter-spacing: 1px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            color: #ccddf8;
        }

        .emotion-badge span {
            color: cyan;
            font-weight: 600;
            margin-left: 8px;
        }

        #emotion-panel {
            top: 24px;
            right: 24px;
            padding: 12px 30px;
            border-radius: 40px;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(20px);
        }

        canvas {
            display: block;
            width: 100vw;
            height: 100vh;
        }
    </style>
</head>
<body>
    <!-- статус слева -->
    <div id="status-bar" class="ui-panel">
        <span id="status-dot" class="idle"></span>
        <span id="status-text">голос неактивен</span>
    </div>

    <!-- эмоция справа -->
    <div id="emotion-panel" class="ui-panel">
        <span>😐 <span id="emotion-value">нейтрально</span></span>
    </div>

    <!-- центральный транскрипт -->
    <div id="transcript-card" class="ui-panel">
        <div id="transcript-text">
            <span id="transcript-placeholder">👆 нажми на микрофон</span>
        </div>
    </div>

    <!-- кнопка микрофона -->
    <div id="mic-container" class="ui-panel">
        <div class="emotion-badge">🎤 голос</div>
        <button class="mic-btn" id="micBtn">🎙️</button>
    </div>

    <!-- Three.js будет рендерить сюда -->
    <script type="importmap">
        {
            "imports": {
                "three": "https://unpkg.com/three@0.128.0/build/three.module.js"
            }
        }
    </script>

    <script type="module">
        import * as THREE from 'three';

        // --- настройка сцены -------------------------------------------------
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x07070b);
        
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 1.5, 16);
        
        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false, powerPreference: "high-performance" });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(Math.min(devicePixelRatio, 2));
        document.body.appendChild(renderer.domElement);
        
        // мягкий свет
        const ambient = new THREE.AmbientLight(0x40406b);
        scene.add(ambient);
        const pointLight = new THREE.PointLight(0xffffff, 1, 30);
        pointLight.position.set(2, 5, 10);
        scene.add(pointLight);

        // --- создаём крутое облако точек (парящие мысли) ---------------------
        const particleCount = 4000;
        const geometry = new THREE.BufferGeometry();
        
        const positions = new Float32Array(particleCount * 3);
        const colors = new Float32Array(particleCount * 3);
        
        const basePositions = []; // для анимации
        
        for (let i = 0; i < particleCount; i++) {
            // сферическое распределение с тороидальным смещением
            const r = 5 + Math.random() * 7;
            const theta = Math.random() * Math.PI * 2;
            const phi = Math.acos(2 * Math.random() - 1);
            
            const x = r * Math.sin(phi) * Math.cos(theta);
            const y = r * Math.sin(phi) * Math.sin(theta) * 0.6;
            const z = r * Math.cos(phi);
            
            positions[i*3] = x;
            positions[i*3+1] = y;
            positions[i*3+2] = z;
            
            basePositions.push({ x, y, z });
            
            // начальный цвет (нейтральный голубоватый)
            colors[i*3] = 0.4 + 0.3 * Math.random();
            colors[i*3+1] = 0.6 + 0.4 * Math.random();
            colors[i*3+2] = 1.0;
        }
        
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        
        // создаём текстуру спрайта (маленький круг с размытием)
        const canvas = document.createElement('canvas');
        canvas.width = 32;
        canvas.height = 32;
        const ctx = canvas.getContext('2d');
        ctx.clearRect(0, 0, 32, 32);
        ctx.fillStyle = 'white';
        ctx.shadowColor = 'white';
        ctx.shadowBlur = 15;
        ctx.beginPath();
        ctx.arc(16, 16, 10, 0, Math.PI*2);
        ctx.fill();
        
        const texture = new THREE.CanvasTexture(canvas);
        
        const particleMaterial = new THREE.PointsMaterial({
            size: 0.18,
            map: texture,
            vertexColors: true,
            blending: THREE.AdditiveBlending,
            transparent: true,
            depthWrite: false,
            opacity: 0.9
        });
        
        const particles = new THREE.Points(geometry, particleMaterial);
        scene.add(particles);
        
        // добавляем фоновые звёзды
        const starGeo = new THREE.BufferGeometry();
        const starPos = new Float32Array(2000 * 3);
        for (let i = 0; i < 2000; i++) {
            starPos[i*3] = (Math.random() - 0.5) * 200;
            starPos[i*3+1] = (Math.random() - 0.5) * 200;
            starPos[i*3+2] = (Math.random() - 0.5) * 200 - 50;
        }
        starGeo.setAttribute('position', new THREE.BufferAttribute(starPos, 3));
        const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.1, transparent: true, opacity: 0.3 });
        const stars = new THREE.Points(starGeo, starMat);
        scene.add(stars);
        
        // --- состояния и переменные интерфейса ------------------------------
        const statusDot = document.getElementById('status-dot');
        const statusText = document.getElementById('status-text');
        const emotionSpan = document.getElementById('emotion-value');
        const transcriptDiv = document.getElementById('transcript-text');
        const placeholderSpan = document.getElementById('transcript-placeholder');
        const micBtn = document.getElementById('micBtn');
        
        let isListening = false;
        let recognition;
        let finalTranscript = '';
        
        // функция обновления цвета облака в зависимости от эмоции
        function setEmotion(emotion, colorRGB) {
            emotionSpan.innerText = emotion;
            
            const colorAttr = geometry.attributes.color;
            const arr = colorAttr.array;
            for (let i = 0; i < particleCount; i++) {
                const i3 = i*3;
                // плавно подтягиваем к целевому цвету
                arr[i3] += (colorRGB[0] - arr[i3]) * 0.1;
                arr[i3+1] += (colorRGB[1] - arr[i3+1]) * 0.1;
                arr[i3+2] += (colorRGB[2] - arr[i3+2]) * 0.1;
            }
            colorAttr.needsUpdate = true;
        }
        
        // карта эмоций на основе ключевых слов (без AI, просто規則)
        function detectEmotionFromText(text) {
            const lower = text.toLowerCase();
            if (lower.includes('рад') || lower.includes('счаст') || lower.includes('круто') || lower.includes('love') || lower.includes('good') || lower.includes('отлично')) {
                return { name: 'радость', color: [1.0, 0.9, 0.2] };
            } else if (lower.includes('груст') || lower.includes('плохо') || lower.includes('устал') || lower.includes('печаль') || lower.includes('sad')) {
                return { name: 'грусть', color: [0.3, 0.4, 1.0] };
            } else if (lower.includes('зл') || lower.includes('бесит') || lower.includes('ненавижу') || lower.includes('fuck') || lower.includes('愤怒')) {
                return { name: 'гнев', color: [1.0, 0.2, 0.2] };
            } else if (lower.includes('люб') || lower.includes('нежн') || lower.includes('милота') || lower.includes('обожаю')) {
                return { name: 'нежность', color: [1.0, 0.5, 0.8] };
            } else if (lower.includes('страх') || lower.includes('боюсь') || lower.includes('тревога') || lower.includes('кошмар')) {
                return { name: 'тревога', color: [0.6, 0.2, 0.9] };
            } else if (lower.includes('привет') || lower.includes('здравствуй')) {
                return { name: 'приветствие', color: [0.2, 1.0, 0.6] };
            }
            return { name: 'нейтрально', color: [0.4, 0.8, 1.0] };
        }

        // --- настройка Web Speech API (реально работает) ----------------------
        if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
            const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            recognition = new SpeechRecognition();
            recognition.continuous = true;
            recognition.interimResults = false; // только финальные фразы (стабильнее)
            recognition.lang = 'ru-RU';
            
            recognition.onstart = () => {
                isListening = true;
                micBtn.classList.add('listening');
                statusDot.className = '';
                statusDot.style.background = '#2ecc71';
                statusDot.style.boxShadow = '0 0 15px #2ecc71';
                statusText.innerText = 'слушаю...';
                placeholderSpan.style.display = 'none';
                transcriptDiv.innerText = '🎙️ ...';
            };
            
            recognition.onerror = (event) => {
                console.warn('речь ошибочка:', event.error);
                isListening = false;
                micBtn.classList.remove('listening');
                statusDot.className = 'idle';
                statusDot.style.background = '#95a5a6';
                statusDot.style.boxShadow = 'none';
                statusText.innerText = 'ошибка микрофона';
                if (event.error === 'not-allowed') {
                    transcriptDiv.innerText = '🚫 доступ к микрофону запрещён';
                }
            };
            
            recognition.onend = () => {
                if (isListening) {
                    // если мы сами не останавливали, пробуем перезапустить (плавно)
                    // но для простоты просто показываем, что остановился
                }
                isListening = false;
                micBtn.classList.remove('listening');
                statusDot.className = 'idle';
                statusDot.style.background = '#95a5a6';
                statusDot.style.boxShadow = 'none';
                statusText.innerText = 'голос неактивен';
            };
            
            recognition.onresult = (event) => {
                let transcript = '';
                for (let i = event.resultIndex; i < event.results.length; i++) {
                    if (event.results[i].isFinal) {
                        transcript += event.results[i][0].transcript;
                    }
                }
                if (transcript) {
                    finalTranscript = transcript;
                    transcriptDiv.innerText = '“' + transcript + '”';
                    
                    const emotion = detectEmotionFromText(transcript);
                    setEmotion(emotion.name, emotion.color);
                }
            };
        } else {
            transcriptDiv.innerText = '❌ браузер не поддерживает распознавание';
            statusText.innerText = 'Web Speech API отсутствует';
            micBtn.disabled = true;
            micBtn.style.opacity = 0.3;
        }
        
        // клик по микрофону
        micBtn.addEventListener('click', () => {
            if (!recognition) return;
            
            if (isListening) {
                recognition.stop();
                isListening = false;
                micBtn.classList.remove('listening');
                statusDot.className = 'idle';
                statusText.innerText = 'голос неактивен';
            } else {
                try {
                    recognition.start();
                } catch (e) {
                    console.warn('restart error, но ок');
                }
            }
        });

        // --- анимация сцены -------------------------------------------------
        let clock = new THREE.Clock();
        
        function animate() {
            requestAnimationFrame(animate);
            
            const delta = clock.getDelta();
            const elapsed = performance.now() * 0.001;
            
            // мягкое вращение облака
            particles.rotation.y += 0.0005;
            particles.rotation.x += 0.0002;
            
            // лёгкое покачивание камеры
            camera.position.x = Math.sin(elapsed * 0.2) * 2;
            camera.position.y = 1.5 + Math.sin(elapsed * 0.3) * 0.5;
            camera.lookAt(0, 0, 0);
            
            renderer.render(scene, camera);
        }
        
        animate();
        
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
